                arr.push({id: defaults.condition.id, name: defaults.condition.name, min: 1, max: 1});
                d.acceptCondition = arr;
            } else if (fieldName === 'completeCondition') {
                const arr = Array.isArray(d.completeCondition) ? [...d.completeCondition] : [];
                arr.push({id: defaults.condition.id, name: defaults.condition.name, min: 1, max: 1});
                d.completeCondition = arr;
            } else if (fieldName === 'inProgressTrack') {
                d.inProgressTrack = {found: true, eventId: defaults.event.id, eventName: defaults.event.name, mapId: 1, x: 0, y: 0};
            } else if (fieldName === 'completeTrack') {
                d.completeTrack = {found: true, eventId: defaults.event.id, eventName: defaults.event.name, mapId: 1, x: 0, y: 0};
            }
            taskEditData.original = d;
            taskEditData.changes[fieldName] = buildRawField(fieldName, d[fieldName]);
            setStatus(`已新增字段: ${fieldName}`);
            const content = document.getElementById('taskModalContent');
            content.innerHTML = renderTaskDetail(d);
            document.getElementById('taskModalTips').classList.remove('visible');
        }

        function removeFieldEntry(fieldName, index) {
            if (!taskEditData.original) return;
            const d = Object.assign({}, taskEditData.original);
            for (const [k, v] of Object.entries(taskEditData.changes)) {
                if (k === 'type') { d.type = parseInt(v); d.taskType = parseInt(v); }
                else if (k === 'name') d.name = v;
                else if (k === 'dsc') d.dsc = v;
                else if (k === 'subType') d.subType = parseInt(v);
                else if (k === 'difficulty') d.difficulty = parseInt(v);
                else if (k === 'countdown') d.countdown = parseInt(v);
                else if (k === 'isRepeat') d.isRepeat = parseInt(v);
                else if (k === 'isHide') d.isHide = parseInt(v);
                else if (k === 'allowDirectReturn') d.allowDirectReturn = parseInt(v);
                else if (k === 'addFavor') d.addFavor = parseInt(v);
                else if (v === '') {
                    if (k === 'acceptCondition') d.acceptCondition = [];
                    else if (k === 'completeCondition') d.completeCondition = [];
                    else if (k === 'acceptTrigger') d.acceptTrigger = [];
                    else if (k === 'deleteTrigger') d.deleteTrigger = [];
                    else if (k === 'failTrigger') d.failTrigger = [];
                    else if (k === 'removeItem') d.removeItem = [];
                    else if (k === 'reward') d.reward = [];
                    else if (k === 'selfAddCondition') d.selfAddCondition = [];
                    else if (k === 'inProgressTrack') d.inProgressTrack = null;
                    else if (k === 'completeTrack') d.completeTrack = null;
                }
            }
            const arr = Array.isArray(d[fieldName]) ? [...d[fieldName]] : [];
            if (index >= 0 && index < arr.length) {
                arr.splice(index, 1);
            }
            d[fieldName] = arr;
            taskEditData.original = d;
            taskEditData.changes[fieldName] = buildRawField(fieldName, arr);
            setStatus(`已删除字段条目: ${fieldName}[${index}]`);
            const content = document.getElementById('taskModalContent');
            content.innerHTML = renderTaskDetail(d);
            document.getElementById('taskModalTips').classList.remove('visible');
        }

        function clearTrackField(fieldName) {
            if (!taskEditData.original) return;
            const d = Object.assign({}, taskEditData.original);
            for (const [k, v] of Object.entries(taskEditData.changes)) {
                if (k === 'type') { d.type = parseInt(v); d.taskType = parseInt(v); }
                else if (k === 'name') d.name = v;
                else if (k === 'dsc') d.dsc = v;
                else if (k === 'subType') d.subType = parseInt(v);
                else if (k === 'difficulty') d.difficulty = parseInt(v);
                else if (k === 'countdown') d.countdown = parseInt(v);
                else if (k === 'isRepeat') d.isRepeat = parseInt(v);
                else if (k === 'isHide') d.isHide = parseInt(v);
                else if (k === 'allowDirectReturn') d.allowDirectReturn = parseInt(v);
                else if (k === 'addFavor') d.addFavor = parseInt(v);
                else if (v === '') {
                    if (k === 'acceptCondition') d.acceptCondition = [];
                    else if (k === 'completeCondition') d.completeCondition = [];
                    else if (k === 'acceptTrigger') d.acceptTrigger = [];
                    else if (k === 'deleteTrigger') d.deleteTrigger = [];
                    else if (k === 'failTrigger') d.failTrigger = [];
                    else if (k === 'removeItem') d.removeItem = [];
                    else if (k === 'reward') d.reward = [];
                    else if (k === 'selfAddCondition') d.selfAddCondition = [];
                    else if (k === 'inProgressTrack') d.inProgressTrack = null;
                    else if (k === 'completeTrack') d.completeTrack = null;
                }
            }
            d[fieldName] = null;
            taskEditData.original = d;
            taskEditData.changes[fieldName] = '';
            setStatus(`已清除: ${fieldName}`);
            const content = document.getElementById('taskModalContent');
            content.innerHTML = renderTaskDetail(d);
            document.getElementById('taskModalTips').classList.remove('visible');
        }

        async function changeTriggerType(fieldName, index, newType) {
            const defaults = await loadFieldDefaults();
            if (!defaults || !taskEditData.original) return;
            const d = Object.assign({}, taskEditData.original);
            for (const [k, v] of Object.entries(taskEditData.changes)) {
                if (k === 'type') { d.type = parseInt(v); d.taskType = parseInt(v); }
                else if (k === 'name') d.name = v;
                else if (k === 'dsc') d.dsc = v;
                else if (k === 'subType') d.subType = parseInt(v);
                else if (k === 'difficulty') d.difficulty = parseInt(v);
                else if (k === 'countdown') d.countdown = parseInt(v);
                else if (k === 'isRepeat') d.isRepeat = parseInt(v);
                else if (k === 'isHide') d.isHide = parseInt(v);
                else if (k === 'allowDirectReturn') d.allowDirectReturn = parseInt(v);
                else if (k === 'addFavor') d.addFavor = parseInt(v);
                else if (v === '') {
                    if (k === 'acceptCondition') d.acceptCondition = [];
                    else if (k === 'completeCondition') d.completeCondition = [];
                    else if (k === 'acceptTrigger') d.acceptTrigger = [];
                    else if (k === 'deleteTrigger') d.deleteTrigger = [];
                    else if (k === 'failTrigger') d.failTrigger = [];
                    else if (k === 'removeItem') d.removeItem = [];
                    else if (k === 'reward') d.reward = [];
                    else if (k === 'selfAddCondition') d.selfAddCondition = [];
                    else if (k === 'inProgressTrack') d.inProgressTrack = null;
                    else if (k === 'completeTrack') d.completeTrack = null;
                }
            }
            const arr = Array.isArray(d[fieldName]) ? [...d[fieldName]] : [];
            const t = parseInt(newType);
            let newEntry;
            if (t === 1) {
                newEntry = {type: 1, itemId: defaults.item.id, itemName: defaults.item.name, count: 1};
            } else if (t === 2) {
                newEntry = {type: 2, storyId: defaults.story.id, storyName: defaults.story.name};
            } else if (t === 3) {
                newEntry = {type: 3, eventId: defaults.event.id, eventName: defaults.event.name, eventRange: 1};
            } else if (t === 4) {
                newEntry = {type: 4, condNum: 1, conditions: [{id: defaults.condition.id, name: defaults.condition.name}]};
            }
            if (newEntry && index >= 0 && index < arr.length) {
                arr[index] = newEntry;
            }
            d[fieldName] = arr;
            taskEditData.original = d;
            taskEditData.changes[fieldName] = buildRawField(fieldName, arr);
            const content = document.getElementById('taskModalContent');
            content.innerHTML = renderTaskDetail(d);
            document.getElementById('taskModalTips').classList.remove('visible');
        }

        function buildRawField(fieldName, data) {
            if (!data || (Array.isArray(data) && data.length === 0)) return '';
            if (fieldName === 'acceptTrigger' || fieldName === 'deleteTrigger' || fieldName === 'failTrigger') {
                return data.map(t => {
                    if (t.type === 1) return `1,${t.itemId},${t.count}`;
                    if (t.type === 2) return `2,${t.storyId}`;
                    if (t.type === 3) return `3,${t.eventId},${t.eventRange}`;
                    if (t.type === 4) return `4,${t.condNum},${(t.conditions || []).map(c => c.id).join(',')}`;
                    return t.raw || '';
                }).join(';');
            } else if (fieldName === 'removeItem') {
                return data.map(it => `${it.itemId},${it.count}`).join(';');
            } else if (fieldName === 'reward') {
                return data.map(r => `${r.itemId},${r.count}`).join(';');
            } else if (fieldName === 'selfAddCondition') {
                return data.map(c => `${c.id},${c.value}`).join(';');
            } else if (fieldName === 'acceptCondition' || fieldName === 'completeCondition') {
                return data.map(c => `${c.id},${c.min !== null ? c.min : ''},${c.max !== null ? c.max : ''}`).join(';');
            } else if (fieldName === 'inProgressTrack' || fieldName === 'completeTrack') {
                if (data && data.mapId !== undefined) return `${data.mapId},${data.x},${data.y}`;
                return '';
            }
            return '';
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('folderInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadFolder();
        });

        (async function autoLoadFolder() {
            try {
                const res = await fetch('/api/current-folder');
                if (res.ok) {
                    const data = await res.json();
                    if (data.path) {
                        document.getElementById('folderInput').value = data.path;
                        loadFolder();
                    }
                }
            } catch (e) {}
        })();

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                if (undoStack.length === 0) {
                    setStatus('没有可撤回的操作');
                    return;
                }
                const action = undoStack.pop();
                if (action.prev === null) {
                    delete pendingChanges[action.key];
                } else {
                    pendingChanges[action.key] = action.prev;
                }
                setStatus(`已撤回（剩余 ${undoStack.length} 步可撤回，${Object.keys(pendingChanges).length} 个待导出项）`);
                if (taskEditData.taskId && document.getElementById('taskModal').classList.contains('open')) {
                    loadTaskDetail(taskEditData.taskId);
                }
            }
        });
    </script>
